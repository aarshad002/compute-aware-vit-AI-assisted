model:
  name: deit_tiny_patch16_224
  num_classes: 100
  pretrained: true
  checkpoint: null

pruning:
  keep_ratio: 0.50
  prune_layer: 6

dataset:
  name: cifar100
  image_size: 224
  data_dir: /home/arooba/compute-aware-vit-thesis/data/

training:
  epochs: 20
  batch_size: 128
  optimizer: adam
  lr: 0.0001
  weight_decay: 0.0001
  seed: 42

output:
  dir: ./outputs
